<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Szyfr Cezara</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

<header class="bg-secondary text-white text-center py-4">
    <h1>SZYFR CEZARA</h1>
</header>

<main class="container my-5">

    <div class="cards-container">

        <div class="card p-4 shadow-sm same-size">
            <label class="fw-bold">TEXT</label>
            <textarea id="toCode" class="form-control mb-3" rows="5"></textarea>

            <label class="fw-bold">KLUCZ</label>
            <input id="key" type="number" class="form-control text-center mb-3" value="1">

            <div class="d-flex gap-2 mb-2">
                <button id="btn" class="btn btn-dark w-50">Zaszyfruj</button>
                <button id="decrypt" class="btn btn-dark w-50">Odszyfruj</button>
            </div>

            <button id="clear" class="btn btn-dark w-100">Wyczyść</button>
        </div>

        <div class="card p-4 shadow-sm same-size d-flex align-items-center justify-content-center">
            <p class="res fw-bold text-center">WYNIK</p>
        </div>

    </div>

</main>

<footer class="bg-secondary text-white py-3 ps-3">
    © ZEG  Bartosz Bąk
</footer>

<script src="script.js"></script>
</body>
</html>
